name: ai_shopping_app
description: AI-powered shopping recommendation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  url_launcher: ^6.2.1
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  speech_to_text: ^6.6.0
  http_parser: ^4.0.2
  mime: ^1.0.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  mobile_scanner: ^5.2.3
  google_mlkit_image_labeling: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
